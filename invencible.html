<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<title>Invencible</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

header h1 {
    font-weight: 800;
}

header a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    opacity: 0.7;
}

header a:hover {
    opacity: 1;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80vh;
    gap: 60px;
    padding: 40px;
}

.hero-text {
    max-width: 400px;
}

.hero-text h2 {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 20px;
}

.hero-text p {
    opacity: 0.7;
    margin-bottom: 30px;
}

.price {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 20px;
}

/* BOTÓN */
button {
    background: #3b82f6;
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-3px);
}

/* IMAGEN */
.hero img {
    width: 320px;
    border-radius: 20px;
    transition: 0.3s;
}

.hero img:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<header>
    <h1>INVENCIBLE</h1>
    <div>
        <a href="#">Inicio</a>
        <a href="#">Tienda</a>
        <a href="#">Contacto</a>
    </div>
</header>

<section class="hero">
    
    <div class="hero-text">
        <h2>Camiseta Invencible</h2>
        <p>Diseño brutal inspirado en la serie. Calidad premium.</p>
        <div class="price" id="precio">20€</div>
        <button onclick="comprar()">Comprar ahora</button>
    </div>

      <img src="./dh9bsx1-86060189-0ed1-4e6a-bc9d-369157c31572-2294821212.png" alt="omniman" id="omni">


</section>

<script src="../main.js">
function comprar() {
    const precio = document.getElementById("precio");
    precio.innerText = "✔ Comprado";
    precio.style.color = "#22c55e";
}


</script>

</body>
</html>
